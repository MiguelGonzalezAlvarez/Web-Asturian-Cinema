version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: asturian-cinema-db
    environment:
      POSTGRES_DB: asturian_cinema
      POSTGRES_USER: asturian
      POSTGRES_PASSWORD: asturian123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asturian -d asturian_cinema"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asturian-cinema-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/asturian_cinema
      SPRING_DATASOURCE_USERNAME: asturian
      SPRING_DATASOURCE_PASSWORD: asturian123
      JWT_SECRET: asturianCinemaSecretKey2024VeryLongSecretKeyForJWT
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:4200
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/asturian-cinema
      dockerfile: Dockerfile
    container_name: asturian-cinema-frontend
    environment:
      NGINX_HOST: localhost
      NGINX_PORT: 80
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
