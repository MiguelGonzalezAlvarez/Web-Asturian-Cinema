# Server Configuration
server.port=8080
app.base-url=http://localhost:8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/asturian_cinema
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT Configuration - Base64 encoded secret (256 bits)
app.jwt.secret=YXN0dXJpYW4tY2luZW1hLXNlY3JldC1rZXktMjAyNC12ZXJ5LWxvbmctYW5kLXNlY3VyZS0yNTYtYml0cw==
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# CORS
app.cors.origins=http://localhost:4200

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.asturiancinema=DEBUG
logging.level.org.springframework.security=DEBUG

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
